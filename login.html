<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - IUBAT Event System</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md bg-white shadow rounded-lg p-6">
    <!-- IUBAT Logo at the top -->
    <div class="flex justify-center mb-6">
      <img src="Iubat-logo.png" alt="IUBAT Logo" class="h-16 w-auto" />
    </div>
    <h2 class="text-2xl font-bold text-center text-blue-900 mb-6">Login</h2>
    
    <div id="messageBox" class="hidden mb-4 p-3 rounded text-sm"></div>
    <form action="login.php" method="POST" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">Email</label>
        <input type="email" name="email" required class="w-full border rounded px-3 py-2 focus:outline-none focus:ring focus:ring-blue-300" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Password</label>
        <input type="password" name="password" required minlength="4" class="w-full border rounded px-3 py-2 focus:outline-none focus:ring focus:ring-blue-300" />
      </div>
      <button type="submit" class="w-full bg-blue-900 text-white py-2 rounded hover:bg-blue-800 transition">Login</button>
    </form>

    <div class="mt-4 text-sm text-center text-gray-600">
      <p>New Student? <a href="register_student.html" class="text-blue-700 hover:underline">Register here</a></p>
      <p class="mt-1">New Supervisor? <a href="register_supervisor.html" class="text-blue-700 hover:underline">Register here</a></p>
    </div>

    <!-- Back Home button for going to index page -->
    <div class="mt-6 text-center">
      <a href="index.html" class="inline-block bg-gray-200 text-gray-800 px-4 py-2 rounded hover:bg-gray-300 transition">Back Home</a>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const error = params.get("error");
    const success = params.get("success");
    const box = document.getElementById("messageBox");
    if (error || success) {
      box.classList.remove("hidden");
      box.textContent = error || success;
      if (error) {
        box.classList.add("bg-red-100", "text-red-700");
      } else {
        box.classList.add("bg-green-100", "text-green-700");
      }
    }
  </script>
</body>
</html>
